<svg xmlns="http://www.w3.org/2000/svg" width="760" height="270" viewBox="0 0 760 270" role="img" aria-label="The misevolution feedback loop">
  <style>
    .t  { font: 500 14px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .ts { font: 400 12px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .lbl{ font: 400 12px -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #888780; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="lbl" x="380" y="26" text-anchor="middle">approval bias accumulates each time the loop turns</text>
  <path d="M625 60 L625 36 L135 36 L135 60" fill="none" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- normal operation (teal) -->
  <g>
    <rect x="60" y="60" width="150" height="58" rx="9" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1"/>
    <text class="t"  x="135" y="86"  text-anchor="middle" fill="#0f6e56">approve</text>
    <text class="ts" x="135" y="104" text-anchor="middle" fill="#0f6e56">grant the refund</text>
  </g>
  <g>
    <rect x="230" y="60" width="150" height="58" rx="9" fill="#e1f5ee" stroke="#1d9e75" stroke-width="1"/>
    <text class="t"  x="305" y="86"  text-anchor="middle" fill="#0f6e56">5-star rating</text>
    <text class="ts" x="305" y="104" text-anchor="middle" fill="#0f6e56">satisfaction = reward</text>
  </g>
  <!-- drift building (amber) -->
  <g>
    <rect x="400" y="60" width="150" height="58" rx="9" fill="#faeeda" stroke="#ba7517" stroke-width="1"/>
    <text class="t"  x="475" y="86"  text-anchor="middle" fill="#854f0b">learn</text>
    <text class="ts" x="475" y="104" text-anchor="middle" fill="#854f0b">"approving is good"</text>
  </g>
  <g>
    <rect x="570" y="60" width="150" height="58" rx="9" fill="#faeeda" stroke="#ba7517" stroke-width="1"/>
    <text class="t"  x="645" y="86"  text-anchor="middle" fill="#854f0b">bias rises</text>
    <text class="ts" x="645" y="104" text-anchor="middle" fill="#854f0b">approve ever more</text>
  </g>

  <line x1="212" y1="89" x2="228" y2="89" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="382" y1="89" x2="398" y2="89" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="552" y1="89" x2="568" y2="89" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>

  <line x1="645" y1="118" x2="645" y2="176" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- outcome (red) -->
  <g>
    <rect x="560" y="178" width="170" height="58" rx="9" fill="#fcebeb" stroke="#a32d2d" stroke-width="1"/>
    <text class="t"  x="645" y="204" text-anchor="middle" fill="#791f1f">safety collapses</text>
    <text class="ts" x="645" y="222" text-anchor="middle" fill="#791f1f">bad requests approved too</text>
  </g>
  <text class="lbl" x="60" y="200">Task success stays high, so</text>
  <text class="lbl" x="60" y="218">aggregate metrics hide the</text>
  <text class="lbl" x="60" y="236">collapse until it is severe.</text>
</svg>
